<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Calendar body -->
  <rect x="3" y="6" width="26" height="23" rx="3" ry="3" fill="#555" />
  <!-- Header bar -->
  <rect x="3" y="6" width="26" height="9" rx="3" ry="3" fill="#222" />
  <!-- Cover bottom of header corners -->
  <rect x="3" y="11" width="26" height="4" fill="#222" />
  <!-- Binding pegs -->
  <rect x="10" y="3" width="3" height="6" rx="1.5" fill="#888" />
  <rect x="19" y="3" width="3" height="6" rx="1.5" fill="#888" />
  <!-- Grid dots / day cells -->
  <rect x="7"  y="19" width="4" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="14" y="19" width="4" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="21" y="19" width="4" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="7"  y="24" width="4" height="3" rx="0.5" fill="white" opacity="0.6"/>
  <rect x="14" y="24" width="4" height="3" rx="0.5" fill="white" opacity="0.6"/>
  <rect x="21" y="24" width="4" height="3" rx="0.5" fill="white" opacity="0.3"/>
</svg>
